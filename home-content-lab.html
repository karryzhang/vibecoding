var dict = T[LANG] || T.en;
document.documentElement.lang = LANG === 'zh' ? 'zh-CN' : 'en';
document.querySelectorAll('[data-i18n]').forEach(function(el){ el.textContent = dict[el.getAttribute('data-i18n')] || ''; });
var themeBtn = document.getElementById('themeToggle');
function toggleTheme(){
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  if (!current) next = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('vibecoding_theme', next);
}
themeBtn.addEventListener('click', toggleTheme);
</script>
</body>
</html>
